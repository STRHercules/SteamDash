<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square, Steam dark -->
  <rect width="512" height="512" rx="80" fill="#171a21"/>

  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="68" fill="none" stroke="#2a475e" stroke-width="1" opacity="0.4"/>

  <!-- Chart area background -->
  <rect x="80" y="160" width="352" height="220" rx="8" fill="#1b2838" opacity="0.6"/>

  <!-- Grid lines -->
  <line x1="80" y1="215" x2="432" y2="215" stroke="#2a475e" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="270" x2="432" y2="270" stroke="#2a475e" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="325" x2="432" y2="325" stroke="#2a475e" stroke-width="1" opacity="0.3"/>

  <!-- Bar chart bars (sales data feel) -->
  <rect x="112" y="310" width="32" height="60" rx="3" fill="#2a475e"/>
  <rect x="160" y="280" width="32" height="90" rx="3" fill="#2a475e"/>
  <rect x="208" y="250" width="32" height="120" rx="3" fill="#3d6c8e"/>
  <rect x="256" y="220" width="32" height="150" rx="3" fill="#3d6c8e"/>
  <rect x="304" y="240" width="32" height="130" rx="3" fill="#66c0f4"/>
  <rect x="352" y="200" width="32" height="170" rx="3" fill="#66c0f4"/>
  <rect x="400" y="180" width="32" height="190" rx="3" fill="#66c0f4"/>

  <!-- Trend line (upward) -->
  <polyline
    points="128,300 176,272 224,244 272,216 320,232 368,196 416,174"
    fill="none"
    stroke="#a4d007"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Trend line dots -->
  <circle cx="128" cy="300" r="5" fill="#a4d007"/>
  <circle cx="176" cy="272" r="5" fill="#a4d007"/>
  <circle cx="224" cy="244" r="5" fill="#a4d007"/>
  <circle cx="272" cy="216" r="5" fill="#a4d007"/>
  <circle cx="320" cy="232" r="5" fill="#a4d007"/>
  <circle cx="368" cy="196" r="5" fill="#a4d007"/>
  <circle cx="416" cy="174" r="5" fill="#a4d007"/>

  <!-- Steam-style joystick/controller nub as "S" motif top-left -->
  <circle cx="256" cy="96" r="28" fill="none" stroke="#66c0f4" stroke-width="3"/>
  <circle cx="256" cy="96" r="12" fill="#66c0f4"/>

  <!-- Title text: "SD" monogram -->
  <text x="256" y="446" text-anchor="middle" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-weight="700" font-size="42" fill="#c7d5e0" letter-spacing="8">STEAM DASH</text>
</svg>